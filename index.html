<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>当直表スケジューラ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:15px}
.app{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:18px;font-weight:600;margin-bottom:1.5rem}
.tabs{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:1.5rem;flex-wrap:wrap;background:#fff;border-radius:8px 8px 0 0;padding:0 .5rem}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:600}
.panel{display:none}.panel.active{display:block}
.stitle{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#888;margin-bottom:8px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
input[type=month]{height:36px;border:1px solid #ddd;border-radius:8px;padding:0 10px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
input[type=number]{height:30px;border:1px solid #ddd;border-radius:6px;padding:0 6px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;width:46px;text-align:center}
input[type=number]:focus{border-color:#555}
.btn{height:36px;padding:0 14px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-size:14px}
.btn.primary:hover{background:#333}
.cb-label{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
.cb-label input{width:15px;height:15px}
.dr-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap}
.dr-row:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hgrid{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.hbtn{font-size:11px;padding:4px 9px;border:1px solid #e0e0e0;border-radius:20px;background:#f8f8f8;cursor:pointer;color:#666;user-select:none;-webkit-user-select:none}
.hbtn.we{font-weight:600;color:#333}
.hbtn.s1{background:#E24B4A!important;color:#fff!important;border-color:#E24B4A!important;font-weight:600}
.hbtn.s2{background:#EF9F27!important;color:#fff!important;border-color:#EF9F27!important;font-weight:600}
.cfg-table{width:100%;border-collapse:collapse;font-size:12px}
.cfg-table th{padding:6px 6px;text-align:center;font-weight:600;color:#888;font-size:11px;border-bottom:2px solid #eee;white-space:nowrap}
.cfg-table th.left{text-align:left}
.cfg-table td{padding:5px 5px;border-bottom:1px solid #f0f0f0;text-align:center;vertical-align:middle}
.cfg-table td.name{text-align:left;font-weight:500;white-space:nowrap;padding-left:2px}
.cfg-table tfoot td{padding:6px 5px;font-size:12px;text-align:center;border-top:2px solid #eee;font-weight:600}
.cfg-table tfoot td.left{text-align:left}
.cal-wrap{overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(55px,1fr));gap:3px;margin-bottom:.5rem;min-width:400px}
.cal-hd{font-size:11px;text-align:center;color:#888;padding:3px;font-weight:600}
.cal-day{font-size:11px;padding:3px 4px;border-radius:8px;min-height:68px;border:1px solid #e8e8e8;background:#fff;overflow:hidden}
.cal-day.empty{border:none;background:none}
.dn{font-size:12px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:3px}
.dtype{font-size:8px;padding:1px 4px;border-radius:6px;font-weight:500}
.dtype.we{background:#dbeafe;color:#1d4ed8}
.dtype.ch{background:#dcfce7;color:#166534}
.dt{font-size:9px;line-height:1.5;color:#333}
.oc{font-size:9px;color:#2563eb;line-height:1.4}
.day-we{background:#eff6ff}.day-arr{background:#fff5f0}.day-vis{background:#f5f0ff}.day-ch{background:#f0fff4}
.shortage{background:#fee2e2!important}
.cell-edit{cursor:pointer;border-radius:4px;padding:1px 3px;display:inline-block}
.cell-edit:hover{background:rgba(0,0,0,.08);text-decoration:underline}
.edit-dropdown{position:fixed;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;min-width:120px;overflow:hidden}
.edit-dropdown .dd-item{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.edit-dropdown .dd-item:last-child{border-bottom:none}
.edit-dropdown .dd-item:hover{background:#f5f5f5}
.edit-dropdown .dd-header{padding:6px 14px;font-size:10px;font-weight:600;color:#888;background:#f8f8f8;text-transform:uppercase;letter-spacing:.05em}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:#f8f8f8;border-radius:8px;padding:10px 12px;border:1px solid #eee}
.metric .lbl{font-size:11px;color:#888;margin-bottom:3px}
.metric .val{font-size:20px;font-weight:600}
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable th{padding:6px 8px;text-align:left;font-weight:600;color:#888;font-size:11px;border-bottom:2px solid #eee}
.rtable td{padding:6px 8px;border-bottom:1px solid #f0f0f0}
.rtable tr:last-child td{border-bottom:none}
.warn{background:#fffbeb;border:1px solid #f59e0b;color:#92400e;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:.75rem;line-height:1.8}
.ok{background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:.75rem}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:8px;padding:8px 14px;font-size:13px;margin-bottom:1rem}
.hol-toggle{font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid #ddd;cursor:pointer;display:flex;align-items:center;gap:5px;background:#fff}
.hol-toggle.is-heavy{background:#fff7ed;color:#9a3412;border-color:#fdba74}
.hol-toggle.is-light{background:#f0fdf4;color:#166534;border-color:#86efac}
.week-block{border:1px solid #e8e8e8;border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;background:#fff}
.week-block:hover{background:#f8f8f8}
.week-block.selected{border-color:#6366f1;background:#eef2ff}
.wd-chip{font-size:11px;padding:2px 8px;border-radius:20px}
.wd-chip.sat{background:#dbeafe;color:#1d4ed8;font-weight:600}
.wd-chip.sun{background:#fee2e2;color:#991b1b;font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.75rem;font-size:11px;color:#666}
.legend span{display:flex;align-items:center;gap:4px}
.legend-sq{display:inline-block;width:10px;height:10px;border-radius:3px;flex-shrink:0}
.section-title{font-size:13px;font-weight:600;margin-bottom:10px;color:#333}
.cell-name{cursor:default;border-radius:3px;padding:1px 2px;transition:background .1s}
.cal-day.highlighted{outline:2px solid #6366f1;outline-offset:-1px;background:#eef2ff!important;z-index:1;position:relative}
.name-tag{display:inline-block;border-radius:3px;padding:0 2px;cursor:default}
.name-tag.hoverable:hover{background:rgba(99,102,241,.15);}
</style>
</head>
<body>
<div class="app">
<h1>当直表スケジューラ</h1>
<div class="tabs">
  <button class="tab active" onclick="switchTab('members')">メンバー</button>
  <button class="tab" onclick="switchTab('monthly')">月の設定</button>
  <button class="tab" onclick="switchTab('config')">回数設定</button>
  <button class="tab" onclick="switchTab('holidays')">希望休</button>
  <button class="tab" onclick="switchTab('generate')">生成</button>
</div>

<!-- メンバー -->
<div id="tab-members" class="panel active">
  <p class="stitle">対象月</p>
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px">
      <input type="month" id="target-month" onchange="onMonthChange()">
      <span style="font-size:14px;color:#888">の当直表を作成</span>
    </div>
  </div>
  <p class="stitle">医師設定</p>
  <div class="card"><div id="dr-list"></div></div>
</div>

<!-- 月の設定（祝日種別 + 八田出勤週） -->
<div id="tab-monthly" class="panel">
  <p class="stitle">月の設定</p>
  <div class="info-box" id="month-info-monthly">対象月を選択してください</div>

  <div class="card">
    <div class="section-title">祝日の種別設定</div>
    <p style="font-size:12px;color:#888;margin-bottom:10px;line-height:1.7"><span style="color:#9a3412;font-weight:600">土日扱</span>＝月制限あり　／　<span style="color:#166534;font-weight:600">診療祝</span>＝平日扱い・制限なし</p>
    <div style="display:flex;flex-wrap:wrap;gap:6px" id="hol-type-area"></div>
  </div>

  <div class="card">
    <div class="section-title">八田先生の出勤週</div>
    <p style="font-size:12px;color:#888;margin-bottom:10px">入る週の土日をタップして選択。未選択の場合は月末土日に自動設定。</p>
    <div id="visiting-week-area"></div>
  </div>
</div>

<!-- 回数設定 -->
<div id="tab-config" class="panel">
  <p class="stitle">今月の担当回数設定</p>
  <div class="info-box" id="month-info-config">対象月を選択してください</div>
  <div class="card">
    <p style="font-size:12px;color:#888;margin-bottom:12px">推奨回数を自動計算して表示しています。数値は直接編集できます。</p>
    <div style="overflow-x:auto">
    <table class="cfg-table">
      <thead>
        <tr>
          <th class="left">医師</th>
          <th>平日<br>当直</th>
          <th>休日<br>当直</th>
          <th>平日<br>oncall</th>
          <th>休日<br>oncall</th>
          <th>当直計</th>
          <th>oncall計</th>
          <th>当直計</th>
          <th>oncall計</th>
        </tr>
      </thead>
      <tbody id="cfg-body"></tbody>
      <tfoot>
        <tr>
          <td class="left" style="font-weight:600;color:#333">合計</td>
          <td id="sum-tW" style="font-weight:600"></td>
          <td id="sum-tH" style="font-weight:600"></td>
          <td id="sum-ocW" style="font-weight:600"></td>
          <td id="sum-ocH" style="font-weight:600"></td>
          <td id="sum-tTotal" style="font-weight:600"></td>
          <td id="sum-ocTotal" style="font-weight:600"></td>
        </tr>
        <tr>
          <td class="left" style="color:#888;font-size:11px">必要数</td>
          <td id="need-tW" style="color:#888;font-size:11px"></td>
          <td id="need-tH" style="color:#888;font-size:11px"></td>
          <td id="need-ocW" style="color:#888;font-size:11px"></td>
          <td id="need-ocH" style="color:#888;font-size:11px"></td>
          <td id="need-tTotal" style="color:#888;font-size:11px"></td>
          <td id="need-ocTotal" style="color:#888;font-size:11px"></td>
        </tr>
      </tfoot>
    </table>
    </div>
  </div>
  <button class="btn primary" style="width:100%;height:38px" onclick="validateConfig()">設定を確認する</button>
  <div id="config-warn" style="margin-top:.75rem"></div>
</div>

<!-- 希望休 -->
<div id="tab-holidays" class="panel">
  <p class="stitle">希望休入力</p>
  <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
    <span style="display:flex;align-items:center;gap:6px;font-size:12px"><span style="display:inline-block;width:32px;height:22px;border-radius:20px;background:#E24B4A"></span>休み（1回）</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:12px"><span style="display:inline-block;width:32px;height:22px;border-radius:20px;background:#EF9F27"></span>oncallのみ（2回）</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:12px"><span style="display:inline-block;width:32px;height:22px;border-radius:20px;background:#f0f0f0;border:1px solid #ddd"></span>通常（3回で戻る）</span>
  </div>
  <div id="holiday-panel"></div>
</div>

<!-- 生成 -->
<div id="tab-generate" class="panel">
  <div id="result-area">
    <div class="card" id="pre-check"></div>
    <button class="btn primary" style="width:100%;height:44px" onclick="generate()">当直表を自動生成</button>
  </div>
</div>
</div>

<script>
const COLORS=['#1D9E75','#378ADD','#639922','#D85A30','#7F77DD','#5F5E5A','#BA7517','#993C1D','#D4537E','#0F6E56','#85B7EB'];
const DOW_LIST=['月','火','水','木','金','土','日'];
const JA_HOL_DEFAULT={
  '2025-01-01':true,'2025-01-13':true,'2025-02-11':false,'2025-02-23':false,'2025-02-24':false,'2025-03-20':false,
  '2025-04-29':false,'2025-05-03':true,'2025-05-04':true,'2025-05-05':false,'2025-05-06':false,
  '2025-07-21':false,'2025-08-11':true,'2025-09-15':false,'2025-09-23':false,
  '2025-10-13':false,'2025-11-03':false,'2025-11-23':false,'2025-11-24':false,
  '2026-01-01':true,'2026-01-12':true,'2026-02-11':false,'2026-02-23':false,'2026-03-20':false,
  '2026-04-29':false,'2026-05-03':true,'2026-05-04':true,'2026-05-05':false,'2026-05-06':false,
  '2026-07-20':false,'2026-08-11':true,'2026-09-21':false,'2026-09-22':false,'2026-09-23':false,
  '2026-10-12':false,'2026-11-03':false,'2026-11-23':false,
  '2027-01-01':true,'2027-01-11':false,'2027-02-11':false,'2027-02-23':false,'2027-03-22':false,
  '2027-04-29':false,'2027-05-03':true,'2027-05-04':true,'2027-05-05':false,
};
let holTypeOverrides={};
let visitingWeekSelected={};
const NG_PAIRS=[['坂元','舟田']];

function isHol(s){return s in JA_HOL_DEFAULT}
function isHeavyHol(s){if(!isHol(s))return false;return s in holTypeOverrides?holTypeOverrides[s]:JA_HOL_DEFAULT[s]}
function getDow(s){return new Date(s+'T00:00:00').getDay()}
function dowLabel(s){const d=getDow(s);return DOW_LIST[d===0?6:d-1]}
function isHeavy(s){const d=getDow(s);return d===6||d===0||isHeavyHol(s)}
function isClinicHol(s){return isHol(s)&&!isHeavyHol(s)}
function getPrevDay(s){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()-1);return d.toISOString().slice(0,10)}
function isNgPair(a,b){return NG_PAIRS.some(p=>(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a))}
function isSunday(s){return getDow(s)===0}

function getDays(){
  const m=document.getElementById('target-month').value;
  if(!m)return[];
  const[y,mo]=m.split('-').map(Number);
  const days=[];const d=new Date(y,mo-1,1);
  while(d.getMonth()===mo-1){
    days.push(`${y}-${String(mo).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    d.setDate(d.getDate()+1);
  }
  return days;
}
function getWeekendPairs(){
  const days=getDays();const pairs=[];
  for(let i=0;i<days.length;i++){
    if(getDow(days[i])===6)pairs.push({sat:days[i],sun:(i+1<days.length&&getDow(days[i+1])===0)?days[i+1]:null});
  }
  return pairs;
}
function getMonthDayCounts(){
  const days=getDays();
  const heavy=days.filter(isHeavy).length;
  return{wdays:days.length-heavy,heavy,total:days.length};
}

let doctors=[
  {name:'坂元', color:COLORS[0], canTochoku:true, canOncall:true,  role:'senior',
   tWMin:0,tWMax:1, tHMin:0,tHMax:0, ocWMin:4,ocWMax:5, ocHMin:1,ocHMax:1, tBias:99,ocBias:0},
  {name:'上西', color:COLORS[1], canTochoku:true, canOncall:false, role:'arrhythmia',
   tWMin:2,tWMax:2, tHMin:1,tHMax:1, ocWMin:0,ocWMax:0, ocHMin:0,ocHMax:0, tBias:2, ocBias:99},
  {name:'舟田', color:COLORS[2], canTochoku:true, canOncall:true,  role:'senior',
   tWMin:1,tWMax:2, tHMin:0,tHMax:1, ocWMin:3,ocWMax:5, ocHMin:1,ocHMax:1, tBias:1, ocBias:1},
  {name:'大沼', color:COLORS[3], canTochoku:true, canOncall:false, role:'arrhythmia',
   tWMin:2,tWMax:2, tHMin:1,tHMax:1, ocWMin:0,ocWMax:0, ocHMin:0,ocHMax:0, tBias:2, ocBias:99},
  {name:'山崎', color:COLORS[4], canTochoku:true, canOncall:true,  role:'mid',
   tWMin:2,tWMax:3, tHMin:0,tHMax:1, ocWMin:3,ocWMax:4, ocHMin:1,ocHMax:1, tBias:3, ocBias:2},
  {name:'坂下', color:COLORS[5], canTochoku:true, canOncall:true,  role:'mid',
   tWMin:2,tWMax:3, tHMin:0,tHMax:1, ocWMin:3,ocWMax:4, ocHMin:1,ocHMax:1, tBias:3, ocBias:2},
  {name:'豊崎', color:COLORS[6], canTochoku:true, canOncall:true,  role:'mid',
   tWMin:2,tWMax:3, tHMin:0,tHMax:1, ocWMin:3,ocWMax:4, ocHMin:1,ocHMax:1, tBias:3, ocBias:2},
  {name:'岸田', color:COLORS[7], canTochoku:true, canOncall:true,  role:'junior',
   tWMin:2,tWMax:3, tHMin:0,tHMax:1, ocWMin:2,ocWMax:3, ocHMin:1,ocHMax:1, tBias:4, ocBias:3},
  {name:'太田', color:COLORS[8], canTochoku:true, canOncall:false, role:'arrhythmia',
   tWMin:2,tWMax:3, tHMin:1,tHMax:1, ocWMin:0,ocWMax:0, ocHMin:0,ocHMax:0, tBias:4, ocBias:99},
  {name:'松本', color:COLORS[9], canTochoku:true, canOncall:true,  role:'junior',
   tWMin:2,tWMax:3, tHMin:0,tHMax:1, ocWMin:2,ocWMax:3, ocHMin:1,ocHMax:1, tBias:4, ocBias:3},
  {name:'八田', color:COLORS[10],canTochoku:true, canOncall:false, role:'visiting',
   tWMin:0,tWMax:0, tHMin:2,tHMax:2, ocWMin:0,ocWMax:0, ocHMin:0,ocHMax:0, tBias:99,ocBias:99},
];

let monthConfig={};
let holidays={};
doctors.forEach(d=>{holidays[d.name]={}});
let schedule={};
let _tW={},_tH={},_ocW={},_ocH={};

// 初期月を現在の翌月に設定
const now=new Date();
const initY=now.getMonth()===11?now.getFullYear()+1:now.getFullYear();
const initM=now.getMonth()===11?1:now.getMonth()+2;
document.getElementById('target-month').value=`${initY}-${String(initM).padStart(2,'0')}`;

function updateMonthInfoBoxes(){
  const days=getDays();
  if(!days.length)return;
  const{wdays,heavy}=getMonthDayCounts();
  const m=document.getElementById('target-month').value;
  const txt=`<strong>${m}</strong>　平日 <strong>${wdays}日</strong>　土日・重祝日 <strong>${heavy}日</strong>`;
  ['month-info-monthly','month-info-config'].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=txt});
}

function onMonthChange(){
  visitingWeekSelected={};
  computeMonthConfig();
  renderHolType();
  renderVisitingWeek();
  renderPreCheck();
  updateMonthInfoBoxes();
}

function computeMonthConfig(){
  monthConfig={};
  doctors.forEach(d=>{
    monthConfig[d.name]={
      tW:Math.round((d.tWMin+d.tWMax)/2),
      tH:Math.round((d.tHMin+d.tHMax)/2),
      ocW:Math.round((d.ocWMin+d.ocWMax)/2),
      ocH:Math.round((d.ocHMin+d.ocHMax)/2),
    };
  });
  renderConfig();
  updateSums();
}

function getVisitingHeavyDays(){
  return doctors.filter(d=>d.role==='visiting').reduce((s,d)=>s+(monthConfig[d.name]?.tH||0),0);
}

function updateSums(){
  const days=getDays();if(!days.length)return;
  const{wdays,heavy}=getMonthDayCounts();
  const visitingHeavy=getVisitingHeavyDays();
  const needOcH=heavy+visitingHeavy;
  const sums={tW:0,tH:0,ocW:0,ocH:0};
  doctors.forEach(d=>{Object.keys(sums).forEach(k=>sums[k]+=(monthConfig[d.name]?.[k]||0))});
  const color=(s,n)=>s===n?'#166534':s>n?'#b91c1c':'#b45309';
  const needMap={tW:wdays,tH:heavy,ocW:wdays,ocH:needOcH};
  Object.entries(needMap).forEach(([k,need])=>{
    const el=document.getElementById('sum-'+k);
    if(el){el.textContent=sums[k];el.style.color=color(sums[k],need);}
    const nel=document.getElementById('need-'+k);
    if(nel)nel.textContent=need;
  });
  const tTotal=sums.tW+sums.tH;
  const ocTotal=sums.ocW+sums.ocH;
  const needT=wdays+heavy;
  const needOc=wdays+needOcH;
  const elT=document.getElementById('sum-tTotal');if(elT){elT.textContent=tTotal;elT.style.color=color(tTotal,needT);}
  const elO=document.getElementById('sum-ocTotal');if(elO){elO.textContent=ocTotal;elO.style.color=color(ocTotal,needOc);}
  const elNT=document.getElementById('need-tTotal');if(elNT)elNT.textContent=needT;
  const elNO=document.getElementById('need-ocTotal');if(elNO)elNO.textContent=needOc;
  renderConfig();
}

  updateSums();

function validateConfig(){
  const days=getDays();
  if(!days.length){document.getElementById('config-warn').innerHTML='<div class="warn">対象月を選択してください</div>';return}
  const{wdays,heavy}=getMonthDayCounts();
  const sums={tW:0,tH:0,ocW:0,ocH:0};
  doctors.forEach(d=>{Object.keys(sums).forEach(k=>sums[k]+=(monthConfig[d.name]?.[k]||0))});
  const visitingHeavy=getVisitingHeavyDays();
  const needs={tW:wdays,tH:heavy,ocW:wdays,ocH:heavy+visitingHeavy};
  const labels={tW:'平日当直',tH:'休日当直',ocW:'平日oncall',ocH:'休日oncall'};
  const diffs=Object.entries(needs).map(([k,need])=>{
    const diff=sums[k]-need;
    if(diff>0)return`<span style="color:#b91c1c;font-weight:500">▲ ${labels[k]} ${diff}多い</span>`;
    if(diff<0)return`<span style="color:#b45309;font-weight:500">▼ ${labels[k]} ${Math.abs(diff)}少ない</span>`;
    return null;
  }).filter(Boolean);

  const el=document.getElementById('config-warn');
  if(diffs.length){
    el.innerHTML=`<div class="warn">${diffs.join('　')}</div>`;
  } else {
    el.innerHTML=`<div class="ok">✓ 合計が一致しています（平日${wdays}日・休日${heavy}日）</div>`;
  }
}

function switchTab(t){

  if(t==='config'){

    else{renderConfig();updateSums();}
    updateMonthInfoBoxes();
  }
  if(t==='holidays')renderHolidays();
  if(t==='generate')renderPreCheck();
}

function showDropdown(e,day,type,idx){
  e.stopPropagation();

    candidates=doctors.filter(d=>d.canTochoku&&d.name!==s.oncall?.[0]&&d.name!==s.oncall?.[1]).map(d=>d.name);
  } else {

      ?doctors.filter(d=>!arrhythmiaSet.has(d.name)&&d.canOncall)

    noneItem.onclick=()=>{

      }
      closeDropdown();
      rerenderResult();
    };
    dd.appendChild(item);
  });

  document.body.appendChild(dd);
  _currentDropdown=dd;
  const rect=e.target.getBoundingClientRect();
  const ddH=Math.min(candidates.length*36+40,280);
  const top=rect.bottom+window.scrollY+4;
  const left=Math.min(rect.left+window.scrollX,window.innerWidth-140);

  dd.style.overflowY='auto';

  dd.style.left=leftPos+'px';
  if(rect.bottom+40>window.innerHeight*0.6){
    dd.style.bottom=(window.innerHeight-rect.top-window.scrollY+4)+'px';
    dd.style.top='auto';
  } else {
    dd.style.top=(rect.bottom+window.scrollY+4)+'px';

  }

function rerenderResult(){
  const days=getDays();
  const arrhythmiaSet=new Set(doctors.filter(d=>d.role==='arrhythmia').map(d=>d.name));
  const visitingSet=new Set(doctors.filter(d=>d.role==='visiting').map(d=>d.name));
  // 集計を再計算
  const tW={},tH={},ocW={},ocH={};
  doctors.forEach(d=>{tW[d.name]=0;tH[d.name]=0;ocW[d.name]=0;ocH[d.name]=0});
  days.forEach(day=>{
    const s=schedule[day];if(!s)return;
    const heavy=isHeavy(day);
    if(s.tochoku){heavy?tH[s.tochoku]++:tW[s.tochoku]++;}
    (s.oncall||[]).forEach(n=>{heavy?ocH[n]++:ocW[n]++;});
  });
  Object.assign(_tW,tW);Object.assign(_tH,tH);Object.assign(_ocW,ocW);Object.assign(_ocH,ocH);
  const warnings=[];
  renderResult(days,tW,tH,ocW,ocH,warnings,arrhythmiaSet,visitingSet);
}

function generate(){
  const days=getDays();
  if(!days.length){alert('対象月を選択してください');return}
  if(Object.keys(monthConfig).length===0)computeMonthConfig();

  const arrhythmiaSet=new Set(doctors.filter(d=>d.role==='arrhythmia').map(d=>d.name));
  const visitingSet=new Set(doctors.filter(d=>d.role==='visiting').map(d=>d.name));
  const ischemicOncallPool=doctors.filter(d=>!arrhythmiaSet.has(d.name)&&d.canOncall);

  const tW={},tH={},ocW={},ocH={};
  doctors.forEach(d=>{tW[d.name]=0;tH[d.name]=0;ocW[d.name]=0;ocH[d.name]=0});

  // 残り割り当て可能回数
  const rem={};
  doctors.forEach(d=>{rem[d.name]={
    tW:monthConfig[d.name]?.tW||0,
    tH:monthConfig[d.name]?.tH||0,
    ocW:monthConfig[d.name]?.ocW||0,
    ocH:monthConfig[d.name]?.ocH||0,
  }});

  schedule={};
  const warnings=[];
  days.forEach(d=>{schedule[d]={tochoku:null,oncall:[]}});

  const weekdays=days.filter(d=>!isHeavy(d));
  const heavyDays=days.filter(d=>isHeavy(d));

  // 直近4日以内に当直があればtrue（中3日=5日以上空ける）
  function hasRecentTochoku(name, currentDay){
    const cur=new Date(currentDay+'T00:00:00');
    for(let i=1;i<=4;i++){
      const d=new Date(cur);d.setDate(d.getDate()-i);
      const ds=d.toISOString().slice(0,10);
      if(schedule[ds]?.tochoku===name)return true;
    }
    return false;
  }

  // =============================================
  // PHASE 1: 休日当直を月全体にバランスよく配置
  // =============================================

  // Step1a: 外勤（八田）の土日2連続を先に確保
  doctors.filter(d=>d.role==='visiting').forEach(vd=>{
    const pairs=getWeekendPairs();
    const sat=visitingWeekSelected[vd.name];
    let tgt=[];
    if(sat){const p=pairs.find(p=>p.sat===sat);if(p){if(p.sat)tgt.push(p.sat);if(p.sun)tgt.push(p.sun);}}
    if(!tgt.length)tgt=heavyDays.slice(-2);
    tgt.forEach(day=>{schedule[day].tochoku=vd.name;tH[vd.name]++;rem[vd.name].tH--;});
    if(tgt.length<2)warnings.push(`${vd.name}：土日2連続確保できませんでした`);
  });

  // Step1b: 残りの休日を全医師でバランスよく割り当てるため
  // 「誰がどの休日に入るか」を事前に一括決定する
  // 不整脈グループを月全体に均等配置してから虚血グループで残りを埋める

  // 利用可能な休日リスト（外勤済み除く）
  const freeHeavy=heavyDays.filter(d=>!schedule[d].tochoku);

  // 不整脈グループ：月全体に均等配置
  // 各医師の「入れる休日」を求め、月の位置が均等になるよう選ぶ
  const arrhDrs=doctors.filter(d=>d.role==='arrhythmia'&&d.canTochoku);

  // 全不整脈医師をまとめて処理：月全体の休日を等分割して担当日を決める
  // 不整脈グループ全体で必要な休日数
  const arrhHeavyNeeded=arrhDrs.reduce((s,d)=>s+(rem[d.name].tH||0),0);

  // 不整脈医師ごとに「使える休日リスト」を作成
  const arrhCandidates={};
  arrhDrs.forEach(d=>{
    arrhCandidates[d.name]=freeHeavy.filter(day=>
      !dayState(d.name,day)&&!schedule[day].tochoku
    );
  });

  // 月全体の休日インデックスを使って均等分散
  // 全不整脈医師の担当日を一括で決定（ラウンドロビン方式）
  // まず月全体の位置でソートされた候補を医師ごとに用意
  // 月の前半・後半にバランスよく入れるため、freeHeavyをn等分して各医師に割り当て
  const assignedHeavyDays=new Set();

  arrhDrs.forEach(d=>{
    const needed=rem[d.name].tH||0;
    if(needed===0)return;
    // この医師が入れる休日（まだ誰も入っていない日）
    const cands=freeHeavy.filter(day=>
      !dayState(d.name,day)&&!assignedHeavyDays.has(day)
    );
    if(!cands.length){
      warnings.push(`${d.name}：休日当直を確保できませんでした`);
      return;
    }
    // 月全体に均等配置：候補をneeded等分してその中間付近の日を選ぶ
    const selected=[];
    const segSize=cands.length/needed;
    for(let i=0;i<needed;i++){
      const segStart=Math.floor(i*segSize);
      const segEnd=Math.min(Math.floor((i+1)*segSize),cands.length)-1;
      // セグメント内でこの医師が入れる日を選ぶ（連続禁止チェック）
      let found=false;
      for(let j=segStart;j<=segEnd;j++){
        const day=cands[j];
        if(assignedHeavyDays.has(day))continue;
        if(dayState(d.name,day))continue;
        // 前後の連続チェック（暫定割り当てを考慮）
        const prevD=getPrevDay(day);
        if(selected.includes(prevD))continue;
        selected.push(day);
        assignedHeavyDays.add(day);
        found=true;
        break;
      }
      if(!found){
        // セグメント内で見つからない場合は残り候補から探す
        for(const day of cands){
          if(assignedHeavyDays.has(day))continue;
          if(dayState(d.name,day))continue;
          const prevD=getPrevDay(day);
          if(selected.includes(prevD))continue;
          selected.push(day);
          assignedHeavyDays.add(day);
          break;
        }
      }
    }
    // 選んだ日を割り当て
    selected.forEach(day=>{
      schedule[day].tochoku=d.name;tH[d.name]++;rem[d.name].tH--;
    });
    if(selected.length<needed)
      warnings.push(`${d.name}：休日当直${needed}回を確保できませんでした（${selected.length}回）`);
  });

  // Step1c: 残りの休日を虚血グループで埋める
  // tScoreで残り回数が多い人優先
  function tScore(d,heavy){
    if(!d.canTochoku||visitingSet.has(d.name)||d.role==='arrhythmia')return 9999;
    const rc=heavy?rem[d.name].tH:rem[d.name].tW;
    if(rc<=0)return 9999;
    return -rc*10+d.tBias*0.3+(Math.random()-0.5)*0.3;
  }

  heavyDays.filter(d=>!schedule[d].tochoku).forEach(day=>{
    const prevOncall=schedule[getPrevDay(day)]?.oncall||[];
    const prevTochoku=schedule[getPrevDay(day)]?.tochoku;
    const avail=doctors.filter(d=>{
      if(!d.canTochoku||visitingSet.has(d.name)||d.role==='arrhythmia')return false;
      if(rem[d.name].tH<=0||dayState(d.name,day)||prevTochoku===d.name)return false;
      if(hasRecentTochoku(d.name,day))return false;
      return true;
    });
    // 間隔ルール緩和（候補ゼロ時のみ）
    const pool=avail.length?avail:doctors.filter(d=>{
      if(!d.canTochoku||visitingSet.has(d.name)||d.role==='arrhythmia')return false;
      if(rem[d.name].tH<=0||dayState(d.name,day)||prevTochoku===d.name)return false;
      return true;
    });
    if(!avail.length&&pool.length)warnings.push(`${day}：間隔ルールを緩和して割り当てました`);
    const prevOncall=schedule[getPrevDay(day)]?.oncall||[];
    let preferred=isSunday(day)?pool.filter(d=>prevOncall.includes(d.name)):[];
    const rest=pool.filter(d=>!preferred.includes(d));
    const sorted=[...preferred,...rest];
    sorted.sort((a,b)=>{const ap=preferred.includes(a)?-5:0,bp=preferred.includes(b)?-5:0;return tScore(a,true)+ap-(tScore(b,true)+bp);});
    if(sorted.length){const ch=sorted[0];schedule[day].tochoku=ch.name;tH[ch.name]++;rem[ch.name].tH--;}
    else warnings.push(`${day}：当直担当を割り当てられませんでした`);
  });

  // =============================================
  // PHASE 2: 休日oncallを決める（休日当直確定後）
  // =============================================
  const arrhOncallCount={};
  ischemicOncallPool.forEach(d=>{arrhOncallCount[d.name]=0});

  function ocScore(d,heavy,isArr){
    if(!d.canOncall)return 9999;
    const rc=heavy?rem[d.name].ocH:rem[d.name].ocW;
    if(rc<=0)return 9999;
    if(isArr)return arrhOncallCount[d.name]*10+d.ocBias*0.2+(Math.random()-0.5)*0.2;
    return -rc*10+d.ocBias*0.3+(Math.random()-0.5)*0.3;
  }

  heavyDays.forEach(day=>{
    const tDoc=schedule[day].tochoku;if(!tDoc)return;
    const isVisiting=visitingSet.has(tDoc);
    const isArr=arrhythmiaSet.has(tDoc);
    const needed=isVisiting?2:1;
    const prevTochoku=schedule[getPrevDay(day)]?.tochoku;
    const pool=(isArr||isVisiting)?ischemicOncallPool:doctors.filter(d=>d.canOncall);

    const avail=pool.filter(dr=>{
      if(dr.name===tDoc||dayState(dr.name,day)===1||isNgPair(tDoc,dr.name))return false;
      if(rem[dr.name].ocH<=0)return false;
      return true;
    });

    let preferred=[];
    if(isSunday(day)&&prevTochoku)preferred=avail.filter(dr=>dr.name===prevTochoku);
    const rest=avail.filter(dr=>!preferred.includes(dr));
    const sorted=[...preferred,...rest];
    sorted.sort((a,b)=>{const ap=preferred.includes(a)?-5:0,bp=preferred.includes(b)?-5:0;return ocScore(a,true,isArr)+ap-(ocScore(b,true,isArr)+bp);});

    let chosen=sorted.slice(0,needed);
    if(chosen.length<needed){
      const fb=pool.filter(dr=>{
        if(dr.name===tDoc||dayState(dr.name,day)===1||isNgPair(tDoc,dr.name))return false;
        return !chosen.find(c=>c.name===dr.name);
      });
      fb.sort((a,b)=>ocScore(a,true,isArr)-ocScore(b,true,isArr));
      const extra=fb.slice(0,needed-chosen.length);
      if(extra.length)warnings.push(`${day}：oncall設定回数を超えて割り当てました`);
      chosen.push(...extra);
    }
    schedule[day].oncall=chosen.map(d=>d.name);
    chosen.forEach(d=>{ocH[d.name]++;rem[d.name].ocH--;if(isArr)arrhOncallCount[d.name]++;});
    if(chosen.length<needed)warnings.push(`${day}(${tDoc})：oncall${needed}人必要→${chosen.length}人のみ`);
  });

  // =============================================
  // PHASE 3: 平日当直・oncallを決める
  // =============================================

  // 不整脈グループ平日当直
  arrhDrs.forEach(d=>{
    let assigned=0;
    for(const day of weekdays){
      if(assigned>=(monthConfig[d.name]?.tW||0))break;
      if(schedule[day].tochoku||dayState(d.name,day))continue;
      if(schedule[getPrevDay(day)]?.tochoku===d.name)continue;
      if(hasRecentTochoku(d.name,day))continue;
      schedule[day].tochoku=d.name;tW[d.name]++;rem[d.name].tW--;assigned++;
    }
    if(assigned<(monthConfig[d.name]?.tW||0))
      warnings.push(`${d.name}：平日当直${monthConfig[d.name]?.tW}回を確保できませんでした（${assigned}回）`);
  });

  // 虚血グループ平日当直
  weekdays.filter(d=>!schedule[d].tochoku).forEach(day=>{
    const prevTochoku=schedule[getPrevDay(day)]?.tochoku;
    const avail=doctors.filter(d=>{
      if(!d.canTochoku||visitingSet.has(d.name)||d.role==='arrhythmia')return false;
      if(rem[d.name].tW<=0||dayState(d.name,day)||prevTochoku===d.name)return false;
      if(hasRecentTochoku(d.name,day))return false;
      return true;
    });
    const pool=avail.length?avail:doctors.filter(d=>{
      if(!d.canTochoku||visitingSet.has(d.name)||d.role==='arrhythmia')return false;
      if(rem[d.name].tW<=0||dayState(d.name,day)||prevTochoku===d.name)return false;
      return true;
    });
    if(!avail.length&&pool.length)warnings.push(`${day}：間隔ルールを緩和して割り当てました`);
    pool.sort((a,b)=>tScore(a,false)-tScore(b,false));
    if(pool.length){const ch=pool[0];schedule[day].tochoku=ch.name;tW[ch.name]++;rem[ch.name].tW--;}
    else warnings.push(`${day}：当直担当を割り当てられませんでした`);
  });

  // 平日oncall
  weekdays.forEach(day=>{
    const tDoc=schedule[day].tochoku;if(!tDoc)return;
    const isVisiting=visitingSet.has(tDoc);
    const isArr=arrhythmiaSet.has(tDoc);
    const needed=isVisiting?2:1;
    const pool=(isArr||isVisiting)?ischemicOncallPool:doctors.filter(d=>d.canOncall);

    const avail=pool.filter(dr=>{
      if(dr.name===tDoc||dayState(dr.name,day)===1||isNgPair(tDoc,dr.name))return false;
      if(rem[dr.name].ocW<=0)return false;
      return true;
    });

    avail.sort((a,b)=>ocScore(a,false,isArr)-ocScore(b,false,isArr));
    let chosen=avail.slice(0,needed);
    if(chosen.length<needed){
      const fb=pool.filter(dr=>{
        if(dr.name===tDoc||dayState(dr.name,day)===1||isNgPair(tDoc,dr.name))return false;
        return !chosen.find(c=>c.name===dr.name);
      });
      fb.sort((a,b)=>ocScore(a,false,isArr)-ocScore(b,false,isArr));
      const extra=fb.slice(0,needed-chosen.length);
      if(extra.length)warnings.push(`${day}：oncall設定回数を超えて割り当てました`);
      chosen.push(...extra);
    }
    schedule[day].oncall=chosen.map(d=>d.name);
    chosen.forEach(d=>{ocW[d.name]++;rem[d.name].ocW--;});
    if(chosen.length<needed)warnings.push(`${day}(${tDoc})：oncall${needed}人必要→${chosen.length}人のみ`);
  });

  // NGペアチェック
  days.forEach(day=>{
    const s=schedule[day];if(!s?.tochoku)return;
    s.oncall.forEach(o=>{if(isNgPair(s.tochoku,o))warnings.push(`${day}：${s.tochoku}×${o} NGペア同日`)});
  });

  Object.assign(_tW,tW);Object.assign(_tH,tH);Object.assign(_ocW,ocW);Object.assign(_ocH,ocH);
  renderResult(days,tW,tH,ocW,ocH,warnings,arrhythmiaSet,visitingSet);
}
function renderResult(days,tW,tH,ocW,ocH,warnings,arrhythmiaSet,visitingSet){
  const[y,mo]=document.getElementById('target-month').value.split('-').map(Number);
  const firstDow=new Date(y,mo-1,1).getDay();
  const offset=firstDow===0?6:firstDow-1;
  const cells=Array(offset).fill(null).concat(days);
  let html='';
  if(warnings.length)html+=`<div class="warn">${warnings.map(w=>`⚠ ${w}`).join('<br>')}</div>`;
  else html+=`<div class="ok">✓ 設定通りに割り当て完了</div>`;

  const{wdays,heavy}=getMonthDayCounts();
  const sumT=doctors.reduce((s,d)=>s+(tW[d.name]||0)+(tH[d.name]||0),0);
  const sumOc=doctors.reduce((s,d)=>s+(ocW[d.name]||0)+(ocH[d.name]||0),0);
  html+=`<div class="mg">
    <div class="metric"><div class="lbl">平日</div><div class="val">${wdays}</div></div>
    <div class="metric"><div class="lbl">土日・重祝日</div><div class="val" style="color:#991b1b">${heavy}</div></div>
    <div class="metric"><div class="lbl">当直合計</div><div class="val">${sumT}</div></div>
    <div class="metric"><div class="lbl">oncall合計</div><div class="val">${sumOc}</div></div>
  </div>`;

  html+=`<div class="legend">
    <span><span class="legend-sq" style="background:#eff6ff;border:1px solid #bfdbfe"></span>土日</span>
    <span><span class="legend-sq" style="background:#fff5f0;border:1px solid #fcd5c0"></span>不整脈当直</span>
    <span><span class="legend-sq" style="background:#f5f0ff;border:1px solid #ddd6fe"></span>外勤当直</span>
    <span><span class="legend-sq" style="background:#f0fff4;border:1px solid #bbf7d0"></span>祝日診療</span>
    <span style="color:#2563eb">📞 oncall</span>
  </div>`;

  html+=`<div class="cal-wrap"><div class="cal-grid">`;
  ['月','火','水','木','金','土','日'].forEach(d=>html+=`<div class="cal-hd">${d}</div>`);
  cells.forEach(day=>{
    if(!day){html+='<div class="cal-day empty"></div>';return}
    const date=new Date(day+'T00:00:00');
    const dow=date.getDay(),hol=isHol(day),heavy=isHeavy(day),cHol=isClinicHol(day);
    const s=schedule[day]||{tochoku:null,oncall:[]};
    const isV=s.tochoku&&visitingSet.has(s.tochoku),isA=s.tochoku&&arrhythmiaSet.has(s.tochoku);
    let bg=heavy?'day-we':'';
    if(cHol)bg='day-ch';if(isA)bg='day-arr';if(isV)bg='day-vis';
    const needed=isV?2:1,shortage=!s.tochoku||(s.oncall.length<needed);
    const typeLabel=cHol?'診祝':heavy?'土日':'平';
    const numColor=dow===6?'#1d4ed8':(dow===0||hol)?'#991b1b':'';
    html+=`<div class="cal-day ${bg}${shortage?' shortage':''}">
      <div class="dn"><span style="font-size:12px;font-weight:700${numColor?`;color:${numColor}`:''}">${date.getDate()}</span>
        <span class="dtype ${heavy&&!cHol?'we':cHol?'ch':''}">${typeLabel}</span>
      </div>
      <div class="dt"><span class="cell-edit" data-doctor="${s.tochoku||''}" onmouseenter="highlightDoctor('${s.tochoku||''}')" onmouseleave="highlightDoctor(null)" onclick="showDropdown(event,'${day}','tochoku',0)" title="クリックして変更">${s.tochoku||'—'}</span></div>
      <div class="oc">${s.oncall.map((n,i)=>`<span class="cell-edit" data-doctor="${n}" onmouseenter="highlightDoctor('${n}')" onmouseleave="highlightDoctor(null)" onclick="showDropdown(event,'${day}','oncall',${i})" title="クリックして変更">📞${n}</span>`).join(' ')}${s.oncall.length===0?`<span class="cell-edit" style="color:#bbb;font-size:9px" onclick="showAddOncall(event,'${day}')" title="oncallを追加">＋</span>`:isV?`<span class="cell-edit" style="color:#bbb;font-size:9px" onclick="showAddOncall(event,'${day}')" title="oncallを追加"> ＋</span>`:''}</div>
    </div>`;
  });
  html+='</div></div>';

  // 集計表（合計列追加）
  html+=`<div class="card"><p class="stitle" style="margin-bottom:8px">個人別集計</p>
  <div style="overflow-x:auto"><table class="cfg-table"><thead><tr>
    <th class="left">医師</th><th>平日<br>当直</th><th>休日<br>当直</th><th>当直計</th><th>平日<br>oncall</th><th>休日<br>oncall</th><th>oncall計</th>
  </tr></thead><tbody>`;
  doctors.forEach(d=>{
    const cfg=monthConfig[d.name]||{tW:0,tH:0,ocW:0,ocH:0};
    const tw=tW[d.name]||0,th=tH[d.name]||0,ow=ocW[d.name]||0,oh=ocH[d.name]||0;
    const tc=tw+th,oc=ow+oh;
    const cfgTc=(cfg.tW||0)+(cfg.tH||0),cfgOc=(cfg.ocW||0)+(cfg.ocH||0);
    const cell=(v,t)=>{
      const col=v===t?'#166534':v<t?'#b45309':'#b91c1c';
      const bg=v===t?'':'';
      return `<td style="text-align:center"><span style="font-weight:600;color:${col}">${v}</span><span style="font-size:10px;color:#aaa">/${t}</span></td>`;
    };
    html+=`<tr>
      <td class="name"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${d.color};margin-right:5px"></span><span class="name-tag hoverable" onmouseenter="highlightDoctor('${d.name}')" onmouseleave="highlightDoctor(null)">${d.name}</span></td>
      ${cell(tw,cfg.tW)}${cell(th,cfg.tH)}
      <td style="text-align:center;background:#f8f8f8"><span style="font-weight:700;color:${tc===cfgTc?'#166534':tc<cfgTc?'#b45309':'#b91c1c'}">${tc}</span><span style="font-size:10px;color:#aaa">/${cfgTc}</span></td>
      ${cell(ow,cfg.ocW)}${cell(oh,cfg.ocH)}
      <td style="text-align:center;background:#f8f8f8"><span style="font-weight:700;color:${oc===cfgOc?'#166534':oc<cfgOc?'#b45309':'#b91c1c'}">${oc}</span><span style="font-size:10px;color:#aaa">/${cfgOc}</span></td>
    </tr>`;
  });
  // 合計行・必要数行
  const sumTW=doctors.reduce((s,d)=>s+(tW[d.name]||0),0);
  const sumTH=doctors.reduce((s,d)=>s+(tH[d.name]||0),0);
  const sumOcW=doctors.reduce((s,d)=>s+(ocW[d.name]||0),0);
  const sumOcH=doctors.reduce((s,d)=>s+(ocH[d.name]||0),0);
  const sumTC=sumTW+sumTH, sumOcC=sumOcW+sumOcH;
  const cfgSumTW=doctors.reduce((s,d)=>s+(monthConfig[d.name]?.tW||0),0);
  const cfgSumTH=doctors.reduce((s,d)=>s+(monthConfig[d.name]?.tH||0),0);
  const cfgSumOcW=doctors.reduce((s,d)=>s+(monthConfig[d.name]?.ocW||0),0);
  const cfgSumOcH=doctors.reduce((s,d)=>s+(monthConfig[d.name]?.ocH||0),0);
  const cfgSumTC=cfgSumTW+cfgSumTH, cfgSumOcC=cfgSumOcW+cfgSumOcH;
  const visitingHeavy2=getVisitingHeavyDays();
  const needOcH2=heavy+visitingHeavy2;
  const sc=(v,t)=>`<span style="font-weight:700;color:${v===t?'#166534':v<t?'#b45309':'#b91c1c'}">${v}</span><span style="font-size:10px;color:#aaa">/${t}</span>`;
  html+=`<tfoot>
    <tr style="border-top:2px solid #eee;background:#f8f8f8">
      <td class="name" style="font-weight:600;padding:6px 5px">実績合計</td>
      <td style="text-align:center">${sc(sumTW,cfgSumTW)}</td>
      <td style="text-align:center">${sc(sumTH,cfgSumTH)}</td>
      <td style="text-align:center;background:#f0f0f0"><span style="font-weight:700;color:${sumTC===cfgSumTC?'#166534':sumTC<cfgSumTC?'#b45309':'#b91c1c'}">${sumTC}</span><span style="font-size:10px;color:#aaa">/${cfgSumTC}</span></td>
      <td style="text-align:center">${sc(sumOcW,cfgSumOcW)}</td>
      <td style="text-align:center">${sc(sumOcH,cfgSumOcH)}</td>
      <td style="text-align:center;background:#f0f0f0"><span style="font-weight:700;color:${sumOcC===cfgSumOcC?'#166534':sumOcC<cfgSumOcC?'#b45309':'#b91c1c'}">${sumOcC}</span><span style="font-size:10px;color:#aaa">/${cfgSumOcC}</span></td>
    </tr>
    <tr style="color:#888">
      <td class="name" style="font-size:11px;padding:4px 5px">必要数</td>
      <td style="text-align:center;font-size:11px">${wdays}</td>
      <td style="text-align:center;font-size:11px">${heavy}</td>
      <td style="text-align:center;font-size:11px;background:#f8f8f8">${wdays+heavy}</td>
      <td style="text-align:center;font-size:11px">${wdays}</td>
      <td style="text-align:center;font-size:11px">${needOcH2}</td>
      <td style="text-align:center;font-size:11px;background:#f8f8f8">${wdays+needOcH2}</td>
    </tr>
  </tfoot>`;
  html+=`</tbody></table></div>
  <p style="font-size:11px;color:#999;margin-top:8px">緑=設定通り　黄=不足　赤=超過</p></div>`;

  html+=`<button class="btn primary" style="width:100%;height:42px;margin-bottom:8px" onclick="exportCSV()">Excelダウンロード（CSV）↓</button>`;
  html+=`<button class="btn" style="width:100%;height:36px" onclick="generate()">再生成</button>`;
  document.getElementById('result-area').innerHTML=html;
}

function exportCSV(){
  const days=getDays();
  const m=document.getElementById('target-month').value;
  const[y,mo]=m.split('-').map(Number);
  let csv=`\uFEFF当直表 ${y}年${mo}月\n日付,曜日,区分,当直,oncall1,oncall2\n`;
  days.forEach(day=>{
    const date=new Date(day+'T00:00:00');
    const heavy=isHeavy(day),cHol=isClinicHol(day);
    const s=schedule[day]||{tochoku:null,oncall:[]};
    csv+=`${date.getMonth()+1}/${date.getDate()},${dowLabel(day)},${heavy?'土日・重祝日':(cHol?'祝日診療':'平日')},${s.tochoku||''},${s.oncall[0]||''},${s.oncall[1]||''}\n`;
  });
  csv+=`\n個人別集計\n医師,平日当直,休日当直,当直計,平日oncall,休日oncall,oncall計\n`;
  doctors.forEach(d=>{
    const tw=_tW[d.name]||0,th=_tH[d.name]||0,ow=_ocW[d.name]||0,oh=_ocH[d.name]||0;
    csv+=`${d.name},${tw},${th},${tw+th},${ow},${oh},${ow+oh}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`当直表_${y}年${mo}月.csv`;a.click();URL.revokeObjectURL(url);
}
